<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SafeDismiss — Dismissal Admin</title>
<link rel="stylesheet" href="assets/styles.css">
</head>
<body data-role="Dismissal Admin">
<div class="app-shell">
<div data-chrome="top"></div>

<main id="main" class="container section">
  <h1 class="page-title" data-i18n="admin_dash"></h1>
  <p class="page-sub"><span data-i18n="school_name"></span> · <span data-i18n="school_city"></span></p>

  <!-- Admin / branch context -->
  <div class="card pad" style="margin-bottom:16px;display:flex;align-items:center;gap:12px;flex-wrap:wrap">
    <div style="font-size:24px">🗂️</div>
    <div style="flex:1;min-width:180px">
      <div class="muted" style="font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.4px" data-i18n="acting_as"></div>
      <strong id="ctxAdmin" style="font-size:17px"></strong>
      <span class="badge badge-navy" id="ctxBranch" style="margin-inline-start:8px"></span>
    </div>
    <div class="field" style="margin:0;min-width:200px">
      <label data-i18n="switch_admin"></label>
      <select id="adminSwitch"></select>
    </div>
  </div>

  <div class="tabs" id="tabs">
    <div class="tab active" data-tab="overrides" data-i18n="tab_override_requests"></div>
    <div class="tab" data-tab="invite" data-i18n="tab_invite_parent"></div>
    <div class="tab" data-tab="students" data-i18n="tab_students_branch"></div>
    <div class="tab" data-tab="frames" data-i18n="tab_dismissal_frames"></div>
    <div class="tab" data-tab="firstlogin" data-i18n="tab_first_login"></div>
  </div>

  <!-- Override requests (default landing) -->
  <section data-pane="overrides">
    <div class="card">
      <div class="card-h">
        <span data-i18n="override_requests"></span>
        <span class="spacer" style="flex:1"></span>
        <span class="badge badge-amber" id="ovCount"></span>
      </div>
      <div class="card-b">
        <p class="muted" style="font-size:13px;margin-top:0" data-i18n="deadline_help"></p>
        <div id="ovCards"></div>
      </div>
    </div>
  </section>

  <!-- Invite parent (assign to branch) -->
  <section data-pane="invite" class="hidden">
    <div class="card pad">
      <h3 style="margin-top:0" data-i18n="invite_partner"></h3>
      <div class="grid grid-2">
        <div class="field" style="margin:0"><label data-i18n="parent_phone"></label><input class="input" id="aiParentPhone" placeholder="07xxxxxxxx"></div>
        <div class="field" style="margin:0"><label data-i18n="parent_email"></label><input class="input" id="aiParentEmail" type="email"></div>
      </div>
      <div style="display:flex;align-items:center;gap:10px;margin:12px 0 4px">
        <h4 style="margin:0;flex:1" data-i18n="children"></h4>
        <button class="btn btn-ghost" id="aiAddKid" type="button">＋ <span data-i18n="add_child"></span></button>
      </div>
      <p class="muted" style="font-size:13px;margin-top:0" data-i18n="parent_branch_auto"></p>
      <div id="aiKidRows"></div>
      <button class="btn btn-primary" id="aiSend" style="margin-top:6px" data-i18n="send_invite"></button>
    </div>
  </section>

  <!-- Students: list (admin's branch) + search/filter + move between branches -->
  <section data-pane="students" class="hidden">
    <div class="card">
      <div class="card-h">
        <span data-i18n="students_title"></span>
        <span class="spacer" style="flex:1"></span>
        <span class="badge badge-navy" id="aiStuCount"></span>
      </div>
      <div class="card-b">
        <p class="muted" style="font-size:13px;margin-top:0" data-i18n="students_help"></p>
        <div class="grid grid-3" style="margin-bottom:14px">
          <div class="field" style="margin:0"><label data-i18n="search"></label><input class="input" id="aiStuSearch" data-i18n-ph="search_name"></div>
          <div class="field" style="margin:0"><label data-i18n="branch"></label><select id="aiStuBranch"></select></div>
          <div class="field" style="margin:0"><label data-i18n="grade"></label><select id="aiStuGrade"></select></div>
        </div>
        <div style="overflow:auto">
          <table class="table table-responsive"><thead><tr>
            <th data-i18n="student"></th><th data-i18n="grade"></th><th data-i18n="parent"></th><th data-i18n="branch"></th><th data-i18n="move_branch"></th>
          </tr></thead><tbody id="aiStuBody"></tbody></table>
        </div>
      </div>
    </div>
  </section>

  <!-- Dismissal time frames + override deadline + method config -->
  <section data-pane="frames" class="hidden">
    <div class="card">
      <div class="card-h" data-i18n="dismissal_frames"></div>
      <div class="card-b">
        <p class="muted" style="font-size:13px" data-i18n="frames_help"></p>
        <div id="bandConfig"></div>
        <hr style="border:none;border-top:1px solid var(--line);margin:14px 0">
        <div class="field">
          <label data-i18n="override_deadline"></label>
          <select id="deadline">
            <option value="30">30 min before dismissal</option>
            <option value="45">45 min before dismissal</option>
            <option value="60">60 min before dismissal</option>
          </select>
        </div>
        <p class="muted" style="font-size:13px" data-i18n="deadline_help"></p>
        <hr style="border:none;border-top:1px solid var(--line);margin:14px 0">
        <h4 style="margin:0 0 8px" data-i18n="config_methods"></h4>
        <div id="methodConfig"></div>
      </div>
    </div>
  </section>

  <!-- First-login approvals -->
  <section data-pane="firstlogin" class="hidden">
    <div class="card">
      <div class="card-h" data-i18n="pending_first_login"></div>
      <div class="card-b" id="firstLogins"></div>
    </div>
  </section>
</main>

<div data-chrome="foot"></div>
</div>
<script src="assets/app.js"></script>
<script>
(function(){
  /* ---- tabs ---- */
  const tabs=document.getElementById("tabs");
  if(tabs){
    tabs.addEventListener("click",e=>{
      const t=e.target.closest(".tab");if(!t)return;
      tabs.querySelectorAll(".tab").forEach(x=>x.classList.remove("active"));
      t.classList.add("active");
      document.querySelectorAll("[data-pane]").forEach(p=>p.classList.toggle("hidden",p.dataset.pane!==t.dataset.tab));
    });
  }

  /* ---- admin / branch context ---- */
  let adminId=(SD.admins()[0]||{}).id||null;
  function curAdmin(){return SD.admins().find(a=>a.id===adminId)||SD.admins()[0]||null;}
  function curBranch(){const a=curAdmin();return a?a.branchId:(SD.branches()[0]||{}).id;}
  function branchOptions(sel){return SD.branches().map(b=>"<option value='"+b.id+"' "+(b.id===sel?"selected":"")+">"+SD.branchName(b)+"</option>").join("");}
  function renderContext(){
    const a=curAdmin();if(!a)return;
    const ca=document.getElementById("ctxAdmin");if(ca)ca.textContent=SD.adminName(a);
    const cb=document.getElementById("ctxBranch");if(cb)cb.textContent=SD.t("your_branch")+": "+SD.branchName(a.branchId);
    const sw=document.getElementById("adminSwitch");
    if(sw){sw.innerHTML=SD.admins().map(x=>"<option value='"+x.id+"' "+(x.id===adminId?"selected":"")+">"+SD.adminName(x)+" · "+SD.branchName(x.branchId)+"</option>").join("");
      sw.onchange=()=>{adminId=sw.value;aiStuFiltersInit=false;renderContext();if(typeof renderAiStudents==="function")renderAiStudents();renderOverrides&&renderOverrides();};}
  }

  function renderFirst(){
    const c=document.getElementById("firstLogins");c.innerHTML="";
    const fl=SD.state().firstLogins;
    if(!fl.length){c.innerHTML="<p class='muted'>"+(SD.curLang()==="ar"?"لا توجد طلبات":"No pending requests")+"</p>";return;}
    fl.forEach(f=>{
      const row=document.createElement("div");
      row.className="card pad";row.style.marginBottom="10px";
      row.style.display="flex";row.style.alignItems="center";row.style.gap="10px";
      row.innerHTML="<div style='flex:1'><strong>"+SD.personName(f.parent)+"</strong><div class='muted' style='font-size:13px'>"+SD.localizeStudentName(f.kid)+" · "+f.time+"</div></div>";
      const ok=document.createElement("button");ok.className="btn btn-success";ok.textContent=SD.t("approve");
      const no=document.createElement("button");no.className="btn btn-ghost";no.textContent=SD.t("deny");
      ok.onclick=()=>{decide(f,true);};no.onclick=()=>{decide(f,false);};
      row.appendChild(ok);row.appendChild(no);c.appendChild(row);
    });
  }
  function decide(f,approved){
    const st=SD.state();
    st.firstLogins=st.firstLogins.filter(x=>x.id!==f.id);
    st.audit.unshift({time:nowTime(),actor:"Admin · Reem",
      event_en:(approved?"Approved":"Denied")+" first login for "+f.parent,
      event_ar:(approved?"اعتماد":"رفض")+" أول دخول لـ "+f.parent,type:approved?"approved":"denied"});
    SD.save();renderFirst();
    document.getElementById("ovPendingMaybe");
    SD.toast((approved?"Approved":"Denied")+" first login · "+f.parent+" notified",approved?"success":"warn");
  }

  function renderBands(){
    const wrap=document.getElementById("bandConfig");if(!wrap)return;wrap.innerHTML="";
    const mins=SD.state().overrideDeadlineMin||30;
    SD.gradeBands().forEach(b=>{
      const cut=SD.timeToDate(b.dismissal);cut.setMinutes(cut.getMinutes()-mins);
      const cutTxt=cut.toLocaleTimeString(SD.curLang()==="ar"?"ar":"en-US",{hour:"2-digit",minute:"2-digit"});
      const row=document.createElement("div");
      row.style.cssText="display:flex;align-items:center;gap:10px;margin-bottom:10px";
      row.innerHTML="<div style='flex:1'><strong>"+SD.bandName(b)+"</strong><div class='muted' style='font-size:12px'>"+SD.t("cutoff_label")+": "+cutTxt+"</div></div>";
      const inp=document.createElement("input");inp.type="time";inp.className="input";inp.style.maxWidth="140px";inp.value=b.dismissal;
      inp.onchange=()=>{b.dismissal=inp.value;SD.save();renderBands();SD.toast(SD.bandName(b)+" "+SD.t("dismissal_time")+" → "+inp.value,"");};
      row.appendChild(inp);wrap.appendChild(row);
    });
  }

  function renderMethods(){
    const wrap=document.getElementById("methodConfig");wrap.innerHTML="";
    SD.state().students.slice(0,3).forEach(s=>{
      const row=document.createElement("div");row.className="field";
      row.innerHTML="<label>"+SD.studentName(s)+" ("+s.grade+")</label>";
      const sel=document.createElement("select");
      [["bus2","bus2"],["bus1m","bus1m"],["bus1a","bus1a"],["car","car"]].forEach(o=>{
        const op=document.createElement("option");op.value=o[0];op.textContent=SD.t(o[1]);
        if(s.method===o[0])op.selected=true;sel.appendChild(op);
      });
      sel.onchange=()=>{s.method=sel.value;SD.save();SD.toast("Updated "+SD.studentName(s)+" → "+SD.t(sel.value),"");};
      row.appendChild(sel);wrap.appendChild(row);
    });
  }

  function renderOverrides(){
    const wrap=document.getElementById("ovCards");if(!wrap)return;wrap.innerHTML="";
    const ovs=SD.state().overrides.slice().sort((a,b)=>(a.status==="pending"?-1:1)-(b.status==="pending"?-1:1));
    const pending=ovs.filter(o=>o.status==="pending").length;
    document.getElementById("ovCount").textContent=pending+" "+SD.t("st_pending");
    if(!ovs.length){wrap.innerHTML="<p class='muted'>"+SD.t("no_override_requests")+"</p>";return;}
    ovs.forEach(o=>{
      const stu=SD.state().students.find(s=>s.name_en===o.student);
      const br=stu?SD.studentBranch(stu):(o.branch?SD.branchById(o.branch):null);
      const card=document.createElement("div");
      card.className="card pad";card.style.cssText="margin-bottom:12px;background:var(--navy-50)";
      const schoolLine=br?("<div class='muted' style='font-size:13px;margin-top:6px'>🏫 "+SD.t("school_name")+" — <strong>📍 "+SD.branchName(br)+"</strong> · "+br.phone+"</div>"):"";
      // Requestor (guardian) name + phone — stored on the request, with a fallback to the kid's guardian.
      const reqName=o.requestor||(stu?stu.parent:"");
      const reqPhone=o.requestorPhone||(stu?stu.phone:"");
      const reqLine=reqName?("<div class='muted' style='font-size:13px;margin-top:4px'>👤 "+SD.t("requested_by")+": <strong>"+SD.personName(reqName)+"</strong>"+(reqPhone?(" — "+reqPhone):"")+"</div>"):"";
      const actions=o.status==="pending"
        ? "<button class='btn btn-success' data-act='ap'>"+SD.t("approve")+"</button> <button class='btn btn-ghost' data-act='dn'>"+SD.t("deny")+"</button>"
        : "";
      card.innerHTML=
        "<div style='display:flex;align-items:flex-start;gap:10px;flex-wrap:wrap'>"+
          "<div style='flex:1;min-width:180px'>"+
            "<div style='display:flex;align-items:center;gap:8px;flex-wrap:wrap'><strong style='font-size:16px'>"+SD.localizeStudentName(o.student)+"</strong> "+SD.statusBadge(o.status)+"</div>"+
            "<div class='muted' style='font-size:13px;margin-top:2px'>"+o.id+" · "+SD.t(o.from)+" → "+SD.t(o.to)+" · "+SD.t("requested_at")+" "+o.time+"</div>"+
            reqLine+
            schoolLine+
          "</div>"+
          "<div style='display:flex;gap:8px;flex-wrap:wrap'>"+actions+"</div>"+
        "</div>";
      const ap=card.querySelector("[data-act='ap']"),dn=card.querySelector("[data-act='dn']");
      if(ap)ap.onclick=()=>decideOv(o,true);
      if(dn)dn.onclick=()=>decideOv(o,false);
      wrap.appendChild(card);
    });
  }
  function decideOv(o,approved){
    o.status=approved?"approved":"denied";
    o.date=SD.dateStr();
    const st=SD.state();
    const stu=st.students.find(s=>SD.studentName(s)===o.student||s.name_en===o.student);
    const adminEn=curAdmin()?curAdmin().name_en:"Reem Odeh";
    // Record who decided so the guardian app can show "Override Approved" / denied-by-<admin>.
    o.decidedBy=adminEn;
    const who="Admin · "+adminEn;
    st.audit.unshift({time:nowTime(),actor:who,
      event_en:(approved?"Approved":"Denied")+" override "+o.id+(stu?(" ("+SD.branchName(stu.branchId)+")"):""),
      event_ar:(approved?"اعتماد":"رفض")+" استثناء "+o.id,type:approved?"approved":"denied"});
    SD.save();renderOverrides();
    if(approved){
      SD.notify("Override "+o.id+" approved for "+o.student+" — a day-scoped pickup QR is now available"+(st.securityRequired?" and routed to gate security":""),
        "تم اعتماد الاستثناء "+o.id+" لـ "+SD.localizeStudentName(o.student)+" — أصبح رمز الاستلام اليومي متاحًا"+(st.securityRequired?" وأُرسل لأمن البوابة":""),"success");
    }else{
      SD.notify("Override "+o.id+" denied — "+o.student+"'s guardian/parent notified","تم رفض الاستثناء "+o.id+" — تم إخطار ولي الأمر1 "+SD.localizeStudentName(o.student),"warn");
    }
  }

  function nowTime(){return new Date().toLocaleTimeString("en-US",{hour:"2-digit",minute:"2-digit"});}

  /* ---- Admin: invite parent + add kids (assign branch) ---- */
  let aiKidSeq=0;
  function aiBandOptions(sel){return SD.gradeBands().map(b=>"<option value='"+b.id+"' "+(b.id===sel?"selected":"")+">"+SD.bandName(b)+"</option>").join("");}
  function aiAddKidRow(){
    const rows=document.getElementById("aiKidRows");if(!rows)return;
    const id="ak"+(aiKidSeq++);
    const div=document.createElement("div");div.className="card pad";div.style.cssText="margin-bottom:10px;background:var(--navy-50)";div.dataset.kid=id;
    div.innerHTML="<div class='grid grid-3'>"+
      "<div class='field' style='margin:0'><label>"+SD.t("student_name")+"</label><input class='input ak-name'></div>"+
      "<div class='field' style='margin:0'><label>"+SD.t("dismissal_level")+"</label><select class='ak-band'>"+aiBandOptions("")+"</select></div>"+
      "<div class='field' style='margin:0'><label>"+SD.t("branch")+"</label><select class='ak-branch'>"+branchOptions(curBranch())+"</select></div>"+
      "</div><div style='text-align:end;margin-top:6px'><button type='button' class='btn btn-ghost ak-remove' style='padding:4px 10px;font-size:13px;color:var(--alert)'>✕ "+SD.t("remove")+"</button></div>";
    div.querySelector(".ak-remove").onclick=()=>div.remove();
    rows.appendChild(div);
  }
  const aiAddKidBtn=document.getElementById("aiAddKid");if(aiAddKidBtn)aiAddKidBtn.onclick=()=>aiAddKidRow();
  const aiSendBtn=document.getElementById("aiSend");
  if(aiSendBtn)aiSendBtn.onclick=()=>{
    const phone=document.getElementById("aiParentPhone").value.trim();
    const defBranch=curBranch();
    const rows=[...document.querySelectorAll("#aiKidRows [data-kid]")];
    const sampleGrade={kg:"KG2",lower:"2-A",upper:"5-A"};
    const st=SD.state();let n=0;const usedBranches=new Set();
    rows.forEach(r=>{
      const name=r.querySelector(".ak-name").value.trim();if(!name)return;
      const band=r.querySelector(".ak-band").value,br=r.querySelector(".ak-branch").value||defBranch;
      usedBranches.add(br);
      const sid="S-"+Math.floor(1200+Math.random()*800);
      st.students.push({id:sid,name_en:name,name_ar:name,grade:sampleGrade[band]||"5-A",method:"bus2",parent:"Invited Parent",branchId:br,status:"waiting"});
      st.audit.unshift({time:nowTime(),actor:"Admin · "+(curAdmin()?curAdmin().name_en:""),event_en:"Invited child "+name+" → "+SD.branchName(br),event_ar:"دعوة الطفل "+name+" → "+SD.branchName(br),type:"info"});n++;
    });
    if(!phone&&!n){SD.toast(SD.curLang()==="ar"?"أدخل هاتف ولي الأمر1 أو طفلًا واحدًا":"Enter a guardian/parent phone or at least one child","warn");return;}
    // Guardian branch(es) are auto-derived from the children's assigned branches.
    const brLabel=[...usedBranches].map(id=>SD.branchName(id)).join(", ")||SD.branchName(defBranch);
    st.audit.unshift({time:nowTime(),actor:"Admin · "+(curAdmin()?curAdmin().name_en:""),event_en:"Invited guardian/parent "+(phone||"")+" → "+brLabel+" (auto from children)",event_ar:"دعوة ولي الأمر1 "+(phone||"")+" → "+brLabel+" (تلقائيًا من الأبناء)",type:"info"});
    SD.save();renderAiStudents();
    document.getElementById("aiParentPhone").value="";document.getElementById("aiParentEmail").value="";
    document.getElementById("aiKidRows").innerHTML="";aiAddKidRow();
    SD.toast((SD.curLang()==="ar"?"تم إرسال الدعوة · الفرع: ":"Invitation sent · branch: ")+brLabel+(n?(" · "+n+" "+SD.t("children")):""),"success");
  };

  /* ---- Admin: list students (default = own branch), search/filter, move w/ confirm ---- */
  let aiStuFiltersInit=false;
  function initStuFilters(){
    const brSel=document.getElementById("aiStuBranch");
    const grSel=document.getElementById("aiStuGrade");
    if(brSel){
      const cur=brSel.value;
      brSel.innerHTML="<option value='"+curBranch()+"'>"+SD.branchName(curBranch())+"</option>"+
        SD.branches().filter(b=>b.id!==curBranch()).map(b=>"<option value='"+b.id+"'>"+SD.branchName(b)+"</option>").join("")+
        "<option value='__all'>"+SD.t("all_branches")+"</option>";
      brSel.value=(aiStuFiltersInit&&cur)?cur:curBranch();
    }
    if(grSel){
      const cur=grSel.value;
      const grades=[...new Set(SD.state().students.map(s=>s.grade))].sort();
      grSel.innerHTML="<option value='__all'>"+SD.t("all_grades")+"</option>"+grades.map(g=>"<option value='"+g+"'>"+g+"</option>").join("");
      grSel.value=(aiStuFiltersInit&&cur)?cur:"__all";
    }
    aiStuFiltersInit=true;
  }
  function renderAiStudents(){
    const body=document.getElementById("aiStuBody");if(!body)return;
    initStuFilters();
    body.innerHTML="";
    const q=((document.getElementById("aiStuSearch")||{}).value||"").toLowerCase();
    const brFilter=(document.getElementById("aiStuBranch")||{}).value||curBranch();
    const grFilter=(document.getElementById("aiStuGrade")||{}).value||"__all";
    const list=SD.state().students.filter(s=>{
      if(brFilter!=="__all"&&s.branchId!==brFilter)return false;
      if(grFilter!=="__all"&&s.grade!==grFilter)return false;
      if(q&&(s.name_en+" "+s.name_ar+" "+s.grade+" "+s.parent+" "+s.id).toLowerCase().indexOf(q)<0)return false;
      return true;
    });
    const cnt=document.getElementById("aiStuCount");if(cnt)cnt.textContent=list.length+" "+SD.t("students_word");
    if(!list.length){body.innerHTML="<tr><td colspan='5' class='muted'>"+SD.t("no_students")+"</td></tr>";return;}
    list.forEach(s=>{
      const tr=document.createElement("tr");
      tr.innerHTML="<td data-label='"+SD.t("student")+"'><strong>"+SD.studentName(s)+"</strong><div class='muted' style='font-size:12px'>"+s.id+"</div></td>"+
        "<td data-label='"+SD.t("grade")+"'>"+s.grade+"</td>"+
        "<td data-label='"+SD.t("parent")+"'>"+SD.personName(s.parent)+"</td>"+
        "<td data-label='"+SD.t("branch")+"'><span class='badge badge-navy'>"+SD.branchName(s.branchId)+"</span></td>"+
        "<td data-label='"+SD.t("move_branch")+"'><select data-stu='"+s.id+"'>"+branchOptions(s.branchId)+"</select></td>";
      const dd=tr.querySelector("select");
      const fromBranch=s.branchId;
      dd.onchange=()=>{
        const target=dd.value;
        if(target===fromBranch)return;
        SD.modal({title:SD.t("confirm_move_title"),
          body:"<p>"+SD.t("confirm_move_q")
                .replace("{student}","<strong>"+SD.studentName(s)+"</strong>")
                .replace("{from}","<strong>"+SD.branchName(fromBranch)+"</strong>")
                .replace("{to}","<strong>"+SD.branchName(target)+"</strong>")+"</p>",
          buttons:[
            {label:SD.t("cancel"),class:"btn-ghost",onClick:()=>{dd.value=fromBranch;}},
            {label:SD.t("confirm"),class:"btn-primary",onClick:()=>{
              SD.moveStudent(s.id,target);
              SD.state().audit.unshift({time:nowTime(),actor:"Admin · "+(curAdmin()?curAdmin().name_en:""),event_en:"Moved "+s.name_en+" from "+SD.branchName(fromBranch)+" to "+SD.branchName(target),event_ar:"نقل "+s.name_ar+" من "+SD.branchName(fromBranch)+" إلى "+SD.branchName(target),type:"info"});SD.save();
              SD.toast(SD.studentName(s)+" → "+SD.branchName(target),"success");
              renderAiStudents();
            }}
          ]});
      };
      body.appendChild(tr);
    });
  }
  ["aiStuSearch","aiStuBranch","aiStuGrade"].forEach(id=>{
    const el=document.getElementById(id);
    if(el){const ev=(el.tagName==="SELECT")?"change":"input";el.addEventListener(ev,renderAiStudents);}
  });

  document.getElementById("deadline").value=SD.state().overrideDeadlineMin;
  document.getElementById("deadline").onchange=function(){
    SD.state().overrideDeadlineMin=parseInt(this.value);SD.save();renderBands();
    SD.toast("Override deadline set to "+this.value+" min before dismissal","");
  };

  function renderAll(){renderContext();renderFirst();renderMethods();renderOverrides();renderBands();renderAiStudents();}
  aiAddKidRow();
  document.addEventListener("langchange",renderAll);
  document.addEventListener("sdsync",renderAll);
  document.addEventListener("DOMContentLoaded",()=>setTimeout(renderAll,0));
})();
</script>
</body>
