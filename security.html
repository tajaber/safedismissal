<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SafeDismiss — Security Gate</title>
<link rel="stylesheet" href="assets/styles.css">
</head>
<body data-role="Security / Gate">
<div class="app-shell">
<div data-chrome="top"></div>

<main id="main" class="container section">
  <h1 class="page-title" data-i18n="sec_dash"></h1>
  <p class="page-sub">Officer Faisal
    <label style="margin-inline-start:14px;font-size:14px;cursor:pointer"><input type="checkbox" id="outdoor"> <span data-i18n="outdoor_mode"></span></label>
  </p>

  <div class="grid grid-2">
    <!-- Scanner -->
    <div class="card pad center">
      <div id="scanBox" style="height:200px;border:2px dashed var(--navy);border-radius:14px;display:grid;place-items:center;background:var(--navy-50);font-size:48px">📷</div>
      <button class="btn btn-primary btn-lg btn-block" id="scanBtn" style="margin-top:14px" data-i18n="scan_qr"></button>
      <div id="scanResult" class="hidden card pad" style="margin-top:14px;text-align:start"></div>

      <hr style="border:none;border-top:1px solid var(--line);margin:18px 0">
      <div style="text-align:start">
        <label style="font-weight:600;font-size:14px" data-i18n="search_phone"></label>
        <div style="display:flex;gap:8px;margin-top:6px">
          <input class="input" id="phoneSearch" placeholder="07xxxxxxxx">
          <button class="btn btn-ghost" id="searchBtn" data-i18n="search"></button>
        </div>
        <div id="searchResult"></div>
      </div>
    </div>

    <!-- Active queue -->
    <div class="card">
      <div class="card-h" data-i18n="active_queue"></div>
      <div style="overflow:auto">
        <table class="table table-responsive"><thead><tr>
          <th data-i18n="student"></th><th data-i18n="parent"></th><th data-i18n="actions"></th>
        </tr></thead><tbody id="queueBody"></tbody></table>
      </div>
      <div id="log" style="padding:14px 18px;border-top:1px solid var(--line);font-size:13px;color:var(--emerald-600);min-height:24px"></div>
    </div>
  </div>
</main>

<div data-chrome="foot"></div>
</div>
<script src="assets/app.js"></script>
<script>
(function(){
  let scanned=null;
  let selectedGate=null;   // officer must choose a gate after a successful scan/verify

  function queue(){return SD.state().students.filter(s=>s.status==="inqueue");}

  // Gate picker shown once a student is verified; release stays disabled until a gate is chosen.
  function gatePickerHtml(student){
    const gates=SD.branchGates(student.branchId);
    const opts="<option value=''>"+SD.t("select_gate")+"</option>"+gates.map(g=>"<option value='"+g+"' "+(g===selectedGate?"selected":"")+">"+g+"</option>").join("");
    return "<div class='field' style='margin:10px 0 0'><label>"+SD.t("gate_label")+"</label><select data-gate>"+opts+"</select>"+
      "<div class='muted' style='font-size:12px;margin-top:4px'>"+SD.t("gate_select_first")+"</div></div>";
  }
  function bindGatePicker(scope){
    const sel=scope.querySelector("[data-gate]");
    if(sel)sel.onchange=()=>{selectedGate=sel.value||null;renderQueue();};
  }

  function renderQueue(){
    const b=document.getElementById("queueBody");b.innerHTML="";
    const q=queue();
    if(!q.length){b.innerHTML="<tr><td colspan='3' class='muted center' style='padding:24px'>"+(SD.curLang()==="ar"?"لا أحد في الطابور":"Queue is empty")+"</td></tr>";}
    q.forEach(s=>{
      const tr=document.createElement("tr");tr.dataset.id=s.id;
      const enabled=scanned===s.id&&!!selectedGate;
      const relLabel=SD.t("confirm_release")+(scanned===s.id&&selectedGate?(" · "+selectedGate):"");
      tr.innerHTML="<td data-label='"+SD.t("student")+"'><strong>"+SD.studentName(s)+"</strong><div class='muted' style='font-size:12px'>"+s.grade+"</div></td>"+
        "<td data-label='"+SD.t("parent")+"'>"+SD.personName(s.parent)+"</td>"+
        "<td data-label='"+SD.t("actions")+"'><button class='btn "+(enabled?"btn-success btn-glow":"btn-ghost")+"' "+(enabled?"":"disabled")+" data-rel='"+s.id+"'>"+relLabel+"</button></td>";
      const rb=tr.querySelector("[data-rel]");
      if(rb&&enabled)rb.onclick=()=>release(s,tr);
      b.appendChild(tr);
    });
  }

  function release(s,tr){
    if(!selectedGate){SD.toast(SD.t("gate_select_first"),"warn");return;}
    const gate=selectedGate;
    tr.classList.add("row-flash");
    s.status="released";
    SD.state().audit.unshift({time:now(),actor:"Security · "+gate,
      event_en:"Released "+s.name_en+" (QR verified) at "+gate,event_ar:"تم تسليم "+s.name_ar+" (تم التحقق من QR) عند "+gate,type:"released"});
    SD.save();
    document.getElementById("log").textContent="✅ "+SD.studentName(s)+" — "+SD.t("released_saved")+" ("+SD.t("released_at_gate")+" "+gate+") "+now();
    SD.notify(SD.studentName(s)+" released at "+gate+" — admin & guardian/parent notified",
      "تم تسليم "+s.name_ar+" عند "+gate+" — تم إخطار الإدارة وولي الأمر1","success");
    scanned=null;selectedGate=null;
    setTimeout(renderQueue,1000);
  }

  document.getElementById("scanBtn").onclick=()=>{
    const box=document.getElementById("scanBox");
    box.innerHTML="<div style='font-size:18px;font-weight:700;color:var(--navy)'>"+SD.t("scanning")+"</div>";
    document.getElementById("scanBtn").disabled=true;
    setTimeout(()=>{
      const q=queue();
      const s=q[0];
      box.innerHTML="<div style='font-size:48px'>✅</div>";
      document.getElementById("scanBtn").disabled=false;
      if(!s){box.innerHTML="<div style='font-size:48px'>📷</div>";SD.toast("Queue empty — nothing to scan","warn");return;}
      scanned=s.id;selectedGate=null;
      const info=SD.pickupInfo(s);
      const res=document.getElementById("scanResult");
      res.classList.remove("hidden");
      const refTxt=info.eligible?("<br><span class='badge badge-green'>"+SD.t("scan_ref")+": "+info.ref+"</span><br><span class='muted' style='font-size:12px'>"+SD.t("qr_valid_today")+" · Token "+info.token+"</span>"):("<br><span class='badge badge-red'>"+SD.t("qr_need_override")+"</span>");
      res.innerHTML="<strong>"+SD.studentName(s)+"</strong> · "+s.id+"<br><span class='muted'>"+SD.t("parent")+": "+SD.personName(s.parent)+"</span><br>"+SD.statusBadge("inqueue")+refTxt;
      if(!info.eligible){scanned=null;SD.toast("Pickup QR invalid for today — verify approval","danger");renderQueue();return;}
      // officer must pick the gate before release becomes available
      res.innerHTML+=gatePickerHtml(s);
      bindGatePicker(res);
      renderQueue();
      SD.toast("QR matched: "+SD.studentName(s)+" ("+info.ref+") — "+SD.t("gate_select_first"),"success");
    },1400);
  };

  document.getElementById("searchBtn").onclick=()=>{
    const v=document.getElementById("phoneSearch").value.trim().toLowerCase();
    const r=document.getElementById("searchResult");
    const q=queue();
    const matches=!v?q:q.filter(s=>
      s.parent.toLowerCase().indexOf(v)>-1 ||
      (s.name_ar||"").indexOf(v)>-1 ||
      SD.studentName(s).toLowerCase().indexOf(v)>-1 ||
      ((s.phone||"").indexOf(v.replace(/\s/g,""))>-1 && v.replace(/\D/g,"").length>=3)
    );
    if(!matches.length){r.innerHTML="<p class='muted' style='margin-top:10px'>"+(SD.curLang()==="ar"?"لا نتائج مطابقة":"No match in active queue")+"</p>";return;}
    r.innerHTML=matches.map(s=>{
      const info=SD.pickupInfo(s);
      return "<div class='card pad' style='margin-top:10px' data-row='"+s.id+"'><strong>"+SD.personName(s.parent)+"</strong> — "+SD.studentName(s)+
      "<div class='muted' style='font-size:13px'>"+(s.phone||"")+" · "+(s.grade)+" · "+(info.eligible?(SD.t("scan_ref")+": "+info.ref):"—")+"</div>"+
      "<button class='btn btn-success' style='margin-top:8px' data-vid='"+s.id+"'>"+SD.t("verify_identity")+"</button></div>";
    }).join("");
    r.querySelectorAll("[data-vid]").forEach(b=>{
      b.onclick=()=>{const s=q.find(x=>x.id===b.dataset.vid);scanned=s.id;selectedGate=null;
        const row=r.querySelector("[data-row='"+s.id+"']");
        if(row&&!row.querySelector("[data-gate]")){row.insertAdjacentHTML("beforeend",gatePickerHtml(s));bindGatePicker(row);}
        renderQueue();SD.toast(SD.t("matched")+" · "+SD.studentName(s)+" — "+SD.t("gate_select_first"),"success");};
    });
  };

  function now(){return new Date().toLocaleTimeString("en-US",{hour:"2-digit",minute:"2-digit"});}

  // B1: outdoor / high-contrast mode (persists)
  const outdoor=document.getElementById("outdoor");
  function applyOutdoor(on){document.body.classList.toggle("hi-contrast",on);outdoor.checked=on;}
  applyOutdoor(localStorage.getItem("sd_outdoor")==="1");
  outdoor.onchange=()=>{localStorage.setItem("sd_outdoor",outdoor.checked?"1":"0");applyOutdoor(outdoor.checked);};

  document.addEventListener("langchange",renderQueue);
  document.addEventListener("sdsync",renderQueue);
  document.addEventListener("DOMContentLoaded",()=>setTimeout(renderQueue,0));
})();
</script>
</body>
</html>
