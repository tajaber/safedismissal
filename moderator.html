<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SafeDismiss — Moderator</title>
<link rel="stylesheet" href="assets/styles.css">
</head>
<body data-role="School Moderator">
<div class="app-shell">
<div data-chrome="top"></div>

<main id="main" class="container section">
  <h1 class="page-title" data-i18n="mod_dash"></h1>
  <p class="page-sub"><span data-i18n="school_name"></span> · <span data-i18n="school_city"></span></p>

  <div class="tabs" id="tabs">
    <div class="tab active" data-tab="overview" data-i18n="tab_overview"></div>
    <div class="tab" data-tab="register" data-i18n="tab_register"></div>
    <div class="tab" data-tab="branches" data-i18n="tab_branches"></div>
    <div class="tab" data-tab="admins" data-i18n="tab_admins"></div>
    <div class="tab" data-tab="security" data-i18n="tab_security"></div>
    <div class="tab" data-tab="classes" data-i18n="tab_classes"></div>
    <div class="tab" data-tab="invite" data-i18n="tab_invite"></div>
    <div class="tab" data-tab="students" data-i18n="tab_students"></div>
    <div class="tab" data-tab="qr" data-i18n="tab_qr"></div>
    <div class="tab" data-tab="audit" data-i18n="tab_audit"></div>
    <div class="tab" data-tab="terms" data-i18n="tab_terms"></div>
  </div>

  <!-- Overview -->
  <section data-pane="overview">
    <div class="grid grid-4" style="margin-bottom:16px">
      <div class="card pad stat"><span class="num">312</span><span class="lbl" data-i18n="total_students"></span></div>
      <div class="card pad stat"><span class="num">498</span><span class="lbl" data-i18n="total_parents"></span></div>
      <div class="card pad stat"><span class="num" id="ovPending">2</span><span class="lbl" data-i18n="pending_approvals"></span></div>
      <div class="card pad stat"><span class="num">41</span><span class="lbl" data-i18n="releases_today"></span></div>
    </div>
    <div class="card">
      <div class="card-h">
        <span data-i18n="security_toggle"></span>
        <span class="spacer" style="flex:1"></span>
        <span class="badge" id="secBadge"></span>
      </div>
      <div class="card-b">
        <p class="muted" data-i18n="security_toggle_d"></p>
        <button class="btn btn-ghost" id="secToggle"></button>
      </div>
    </div>
  </section>

  <!-- Register / School setup -->
  <section data-pane="register" class="hidden">
    <div class="card pad">
      <div class="grid grid-2">
        <div class="field"><label data-i18n="label_school"></label><input class="input" id="schoolName" value="Alfarid Star Academy & Schools"></div>
        <div class="field"><label data-i18n="label_city"></label><input class="input" id="schoolCity" value="Amman, Jordan"></div>
        <div class="field"><label data-i18n="label_phone"></label><input class="input" id="schoolPhone" value="0791234567"></div>
        <div class="field"><label data-i18n="label_address"></label><input class="input" id="schoolAddr" value="Amman, Jordan"></div>
      </div>
      <h4 style="margin:6px 0 4px" data-i18n="dismissal_frames"></h4>
      <p class="muted" style="font-size:13px;margin-top:0" data-i18n="frames_help"></p>
      <div id="bandSetup"></div>
      <button class="btn btn-primary" style="margin-top:12px" onclick="SD.toast('School profile saved','success')" data-i18n="save"></button>
    </div>
  </section>

  <!-- Branches -->
  <section data-pane="branches" class="hidden">
    <div class="card pad">
      <h3 style="margin-top:0" data-i18n="branches_title"></h3>
      <p class="muted" style="font-size:13px" data-i18n="branches_help"></p>
      <div class="grid grid-4" style="align-items:end">
        <div class="field" style="margin:0"><label data-i18n="branch_name"></label><input class="input" id="brName" placeholder="e.g. East Branch"></div>
        <div class="field" style="margin:0"><label data-i18n="branch_phone"></label><input class="input" id="brPhone" placeholder="07xxxxxxxx"></div>
        <div class="field" style="margin:0"><label data-i18n="call_center"></label><input class="input" id="brCall" placeholder="07xxxxxxxx"></div>
        <button class="btn btn-primary" id="addBranch" type="button">＋ <span data-i18n="add_branch"></span></button>
      </div>
      <div style="overflow:auto;margin-top:16px">
        <table class="table table-responsive"><thead><tr>
          <th data-i18n="branch_name"></th><th data-i18n="branch_phone"></th><th data-i18n="call_center"></th><th data-i18n="total_students"></th><th data-i18n="tab_admins"></th>
        </tr></thead><tbody id="brBody"></tbody></table>
      </div>
    </div>
  </section>

  <!-- Admins -->
  <section data-pane="admins" class="hidden">
    <div class="card pad">
      <h3 style="margin-top:0" data-i18n="admins_title"></h3>
      <p class="muted" style="font-size:13px" data-i18n="admins_help"></p>
      <div class="grid grid-3" style="align-items:end">
        <div class="field" style="margin:0"><label data-i18n="admin_name"></label><input class="input" id="adName" placeholder="e.g. Nour Saleh"></div>
        <div class="field" style="margin:0"><label data-i18n="admin_phone"></label><input class="input" id="adPhone" placeholder="07xxxxxxxx"></div>
        <div class="field" style="margin:0"><label data-i18n="assigned_branch"></label><select id="adBranch"></select></div>
      </div>
      <button class="btn btn-primary" id="addAdmin" type="button" style="margin-top:4px">＋ <span data-i18n="create_admin"></span></button>
      <div style="overflow:auto;margin-top:16px">
        <table class="table table-responsive"><thead><tr>
          <th data-i18n="admin_name"></th><th data-i18n="admin_phone"></th><th data-i18n="move_branch"></th>
        </tr></thead><tbody id="adBody"></tbody></table>
      </div>
    </div>
  </section>

  <!-- Security personnel -->
  <section data-pane="security" class="hidden">
    <div class="card pad">
      <h3 style="margin-top:0" data-i18n="security_title"></h3>
      <p class="muted" style="font-size:13px" data-i18n="security_help"></p>
      <div class="grid grid-3" style="align-items:end">
        <div class="field" style="margin:0"><label data-i18n="security_name"></label><input class="input" id="secName" placeholder="e.g. Faisal Omar"></div>
        <div class="field" style="margin:0"><label data-i18n="security_phone"></label><input class="input" id="secPhone" placeholder="07xxxxxxxx"></div>
        <div class="field" style="margin:0"><label data-i18n="assigned_branch"></label><select id="secBranch"></select></div>
      </div>
      <button class="btn btn-primary" id="addSecurity" type="button" style="margin-top:4px">＋ <span data-i18n="create_security"></span></button>
      <div style="overflow:auto;margin-top:16px">
        <table class="table table-responsive"><thead><tr>
          <th data-i18n="security_name"></th><th data-i18n="security_phone"></th><th data-i18n="branch"></th><th data-i18n="move_branch"></th>
        </tr></thead><tbody id="secBody"></tbody></table>
      </div>
    </div>
  </section>

  <!-- Classes & classroom display (per-branch feature) -->
  <section data-pane="classes" class="hidden">
    <div class="card pad" style="margin-bottom:16px">
      <h3 style="margin-top:0" data-i18n="classes_title"></h3>
      <p class="muted" style="font-size:13px" data-i18n="classes_help"></p>
      <div id="branchFeatureList"></div>
    </div>
    <div class="card pad">
      <div class="grid grid-3" style="align-items:end">
        <div class="field" style="margin:0"><label data-i18n="class_name"></label><input class="input" id="clName" placeholder="e.g. Grade 3 — Lions"></div>
        <div class="field" style="margin:0"><label data-i18n="branch"></label><select id="clBranch"></select></div>
        <button class="btn btn-primary" id="addClass" type="button">＋ <span data-i18n="add_class"></span></button>
      </div>
      <div style="overflow:auto;margin-top:16px">
        <table class="table table-responsive"><thead><tr>
          <th data-i18n="student"></th><th data-i18n="grade"></th><th data-i18n="branch"></th><th data-i18n="link_class"></th>
        </tr></thead><tbody id="clStuBody"></tbody></table>
      </div>
    </div>
  </section>

  <!-- Students (branch assignment / move) -->
  <section data-pane="students" class="hidden">
    <div class="card">
      <div class="card-h">
        <span data-i18n="students_title"></span>
        <span class="spacer" style="flex:1"></span>
        <input class="input" id="stuSearch" style="max-width:200px;padding:8px 10px" data-i18n-ph="search">
      </div>
      <div class="card-b">
        <p class="muted" style="font-size:13px;margin-top:0" data-i18n="students_help"></p>
        <div style="overflow:auto">
          <table class="table table-responsive"><thead><tr>
            <th data-i18n="student"></th><th data-i18n="grade"></th><th data-i18n="parent"></th><th data-i18n="move_branch"></th>
          </tr></thead><tbody id="stuBody"></tbody></table>
        </div>
      </div>
    </div>
  </section>

  <!-- Invite parents -->
  <section data-pane="invite" class="hidden">
    <div class="card pad">
      <h3 style="margin-top:0" data-i18n="invite_partner"></h3>
      <div class="grid grid-2">
        <div class="field"><label data-i18n="parent_phone"></label><input class="input" placeholder="07xxxxxxxx"></div>
        <div class="field"><label data-i18n="parent_email"></label><input class="input" type="email"></div>
        <div class="field"><label data-i18n="coparent_phone"></label><input class="input" placeholder="07xxxxxxxx"></div>
        <div class="field"><label data-i18n="coparent_email"></label><input class="input" type="email"></div>
      </div>
      <div style="display:flex;align-items:center;gap:10px;margin:6px 0">
        <h4 style="margin:0;flex:1" data-i18n="children"></h4>
        <button class="btn btn-ghost" id="addKid" type="button">＋ <span data-i18n="add_child"></span></button>
      </div>
      <p class="muted" style="font-size:13px;margin-top:0" data-i18n="children_help"></p>
      <p class="muted" style="font-size:13px;margin-top:0" data-i18n="parent_branch_auto"></p>
      <div id="kidRows"></div>
      <button class="btn btn-primary" id="sendInvite" style="margin-top:6px" data-i18n="send_invite"></button>
    </div>
  </section>

  <!-- QR -->
  <section data-pane="qr" class="hidden">
    <div class="grid grid-3" id="qrGrid"></div>
  </section>

  <!-- Audit -->
  <section data-pane="audit" class="hidden">
    <div class="card">
      <div class="card-h">
        <span data-i18n="tab_audit"></span>
        <span class="spacer" style="flex:1"></span>
        <input class="input" id="auditFilter" style="max-width:200px;padding:8px 10px" data-i18n-ph="filter_log">
        <button class="btn btn-ghost" id="exportCsv" style="margin-inline-start:8px" data-i18n="export_csv"></button>
      </div>
      <div style="overflow:auto">
        <table class="table table-responsive"><thead><tr>
          <th data-i18n="time"></th><th>Actor</th><th>Event</th><th data-i18n="status"></th>
        </tr></thead><tbody id="auditBody"></tbody></table>
      </div>
    </div>
  </section>

  <!-- Terms -->
  <section data-pane="terms" class="hidden">
    <div class="card pad">
      <p class="muted" data-i18n="terms_intro"></p>
      <textarea rows="8" class="input">1. Parents agree to use SafeDismiss only for authorized pickups.
2. Pickup QR codes are personal and must not be shared.
3. The school may require gate security verification at its discretion.
4. Override requests close 30 minutes before dismissal.
5. All dismissal actions are logged for safety and auditing.</textarea>
      <button class="btn btn-primary" style="margin-top:12px" onclick="SD.toast('Terms published to all guardians/parents','success')" data-i18n="save"></button>
    </div>
  </section>
</main>

<div data-chrome="foot"></div>
</div>
<script src="assets/app.js"></script>
<script>
(function(){
  const tabs=document.getElementById("tabs");
  tabs.addEventListener("click",e=>{
    const t=e.target.closest(".tab");if(!t)return;
    tabs.querySelectorAll(".tab").forEach(x=>x.classList.remove("active"));
    t.classList.add("active");
    document.querySelectorAll("[data-pane]").forEach(p=>p.classList.toggle("hidden",p.dataset.pane!==t.dataset.tab));
  });

  function renderSecurity(){
    const on=SD.state().securityRequired;
    const badge=document.getElementById("secBadge");
    badge.className="badge "+(on?"badge-green":"badge-red");
    badge.textContent=on?SD.t("required"):SD.t("not_required");
    document.getElementById("secToggle").textContent=on?SD.t("not_required"):SD.t("required");
  }
  document.getElementById("secToggle").onclick=()=>{
    SD.state().securityRequired=!SD.state().securityRequired;SD.save();
    renderSecurity();
    SD.toast(SD.state().securityRequired?"Gate security set to REQUIRED":"Gate security set to NOT required",
      SD.state().securityRequired?"success":"warn");
  };

  // Editable per-band dismissal time frames (school setup)
  function renderBandSetup(){
    const wrap=document.getElementById("bandSetup");if(!wrap)return;wrap.innerHTML="";
    SD.gradeBands().forEach(b=>{
      const row=document.createElement("div");
      row.style.cssText="display:flex;align-items:center;gap:10px;margin-bottom:8px";
      row.innerHTML="<div style='flex:1'><strong>"+SD.bandName(b)+"</strong></div>";
      const inp=document.createElement("input");inp.type="time";inp.className="input";inp.style.maxWidth="150px";inp.value=b.dismissal;
      inp.onchange=()=>{b.dismissal=inp.value;SD.save();SD.toast(SD.bandName(b)+" "+SD.t("dismissal_time")+" → "+inp.value,"success");};
      const lbl=document.createElement("label");lbl.style.cssText="font-size:13px;color:var(--muted)";lbl.textContent=SD.t("dismissal_time");
      row.appendChild(lbl);row.appendChild(inp);wrap.appendChild(row);
    });
  }

  // Invite: add multiple children, each with Name / ID / Dismissal level
  let kidSeq=0;
  function bandOptions(sel){
    return SD.gradeBands().map(b=>"<option value='"+b.id+"' "+(b.id===sel?"selected":"")+">"+SD.bandName(b)+" · "+b.dismissal+"</option>").join("");
  }
  function branchOptions(sel){
    return SD.branches().map(b=>"<option value='"+b.id+"' "+(b.id===sel?"selected":"")+">"+SD.branchName(b)+"</option>").join("");
  }
  function fillBranchSelect(el,sel){if(el)el.innerHTML=branchOptions(sel);}
  function addKidRow(prefill){
    const rows=document.getElementById("kidRows");if(!rows)return;
    const id="kr"+(kidSeq++);
    const div=document.createElement("div");div.className="card pad";div.style.cssText="margin-bottom:10px;background:var(--navy-50)";div.dataset.kid=id;
    div.innerHTML=
      "<div class='grid grid-4'>"+
        "<div class='field' style='margin:0'><label>"+SD.t("student_name")+"</label><input class='input k-name' placeholder='"+(SD.curLang()==="ar"?"مثال: بيسان جابر":"e.g. Bisan Jaber")+"' value='"+((prefill&&prefill.name)||"")+"'></div>"+
        "<div class='field' style='margin:0'><label>"+SD.t("student_id")+"</label><input class='input k-id' placeholder='S-1xxx' value='"+((prefill&&prefill.id)||"")+"'></div>"+
        "<div class='field' style='margin:0'><label>"+SD.t("dismissal_level")+"</label><select class='k-band'>"+bandOptions((prefill&&prefill.band)||"")+"</select></div>"+
        "<div class='field' style='margin:0'><label>"+SD.t("branch")+"</label><select class='k-branch'>"+branchOptions((prefill&&prefill.branch)||"")+"</select></div>"+
      "</div>"+
      "<div style='text-align:end;margin-top:6px'><button type='button' class='btn btn-ghost k-remove' style='padding:4px 10px;font-size:13px;color:var(--alert)'>✕ "+SD.t("remove")+"</button></div>";
    div.querySelector(".k-remove").onclick=()=>div.remove();
    rows.appendChild(div);
  }
  const addKidBtn=document.getElementById("addKid");
  if(addKidBtn)addKidBtn.onclick=()=>addKidRow();

  document.getElementById("sendInvite").onclick=()=>{
    const rows=[...document.querySelectorAll("#kidRows [data-kid]")];
    const defBranch=(SD.branches()[0]||{}).id;
    const kids=rows.map(r=>({
      name:r.querySelector(".k-name").value.trim(),
      id:r.querySelector(".k-id").value.trim(),
      band:r.querySelector(".k-band").value,
      branch:(r.querySelector(".k-branch")||{}).value||defBranch
    })).filter(k=>k.name);
    if(!kids.length){SD.toast(SD.curLang()==="ar"?"أضف طفلًا واحدًا على الأقل":"Add at least one child","warn");return;}
    // sample grade per band so each kid maps to the right dismissal level
    const sampleGrade={kg:"KG2",lower:"2-A",upper:"5-A"};
    const st=SD.state();
    kids.forEach((k,i)=>{
      const sid=k.id||("S-"+Math.floor(1200+Math.random()*800));
      st.students.push({id:sid,name_en:k.name,name_ar:k.name,grade:sampleGrade[k.band]||"5-A",method:"bus2",parent:"Invited Parent",branchId:k.branch,status:"waiting"});
      st.audit.unshift({time:SD.nowTime(),actor:"Moderator · Admin",
        event_en:"Invited child "+k.name+" ("+sid+", "+k.band+" band, "+SD.branchName(k.branch)+")",event_ar:"دعوة الطفل "+k.name+" ("+sid+"، مرحلة "+k.band+"، "+SD.branchName(k.branch)+")",type:"info"});
    });
    SD.save();renderQR();renderStudents();
    const list=kids.map(k=>{const b=SD.gradeBands().find(x=>x.id===k.band);return "<li>"+k.name+(k.id?(" · "+k.id):"")+" — "+SD.bandName(b)+" · "+SD.branchName(k.branch)+"</li>";}).join("");
    SD.modal({title:SD.t("send_invite"),
      body:"<p>"+(SD.curLang()==="ar"?"تم إرسال دعوات SMS/بريد إلى ولي الأمر1 وولي الأمر2، وإنشاء حسابات الأبناء التالية برموز QR:":"SMS/email invitations sent to guardian/parent &amp; guardian/parent2. The following children were created with onboarding QR codes:")+"</p><ul style='margin:6px 0 10px;padding-inline-start:18px'>"+list+"</ul><p class='muted' style='font-size:13px'>"+SD.t("parent_branch_auto")+"</p><div class='qr'>"+SD.qrSvg("invite-"+Date.now())+"</div>",
      buttons:[{label:SD.t("close"),class:"btn-primary"}]});
    document.getElementById("kidRows").innerHTML="";addKidRow();
  };

  function renderQR(){
    const grid=document.getElementById("qrGrid");grid.innerHTML="";
    SD.state().students.forEach(s=>{
      const d=document.createElement("div");d.className="card pad center";
      d.innerHTML="<div class='qr'>"+SD.qrSvg(s.id)+"</div>"+
        "<h4 style='margin:12px 0 2px'>"+SD.studentName(s)+"</h4>"+
        "<div class='muted' style='font-size:13px'>"+SD.t("grade")+" "+s.grade+" · "+s.id+"</div>"+
        "<button class='btn btn-ghost' style='margin-top:10px' data-i18n='download_qr'>"+SD.t("download_qr")+"</button>";
      d.querySelector("button").onclick=()=>SD.toast("QR for "+SD.studentName(s)+" downloaded","");
      grid.appendChild(d);
    });
  }
  function renderAudit(){
    const b=document.getElementById("auditBody");b.innerHTML="";
    const q=(document.getElementById("auditFilter")||{}).value||"";
    const qq=q.toLowerCase();
    SD.state().audit.filter(a=>{
      if(!qq)return true;
      return (a.time+" "+a.actor+" "+a.event_en+" "+a.event_ar+" "+a.type).toLowerCase().indexOf(qq)>-1;
    }).forEach(a=>{
      const tr=document.createElement("tr");
      tr.innerHTML="<td data-label='"+SD.t("time")+"'>"+a.time+"</td><td data-label='Actor'>"+a.actor+"</td><td data-label='Event'>"+(SD.curLang()==="ar"?a.event_ar:a.event_en)+"</td><td data-label='"+SD.t("status")+"'>"+SD.statusBadge(a.type==="info"?"inqueue":a.type)+"</td>";
      b.appendChild(tr);
    });
  }
  function exportCsv(){
    const q=((document.getElementById("auditFilter")||{}).value||"").toLowerCase();
    const rows=SD.state().audit.filter(a=>!q||(a.time+" "+a.actor+" "+a.event_en+" "+a.type).toLowerCase().indexOf(q)>-1);
    const esc=s=>'"'+String(s).replace(/"/g,'""')+'"';
    const csv=["Time,Actor,Event,Type"].concat(rows.map(a=>[a.time,a.actor,a.event_en,a.type].map(esc).join(","))).join("\r\n");
    const blob=new Blob([csv],{type:"text/csv"});
    const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="safedismiss-audit.csv";a.click();
    SD.toast("Audit log exported ("+rows.length+" rows)","success");
  }
  function setSchoolFields(){
    const map={schoolName:"school_name",schoolCity:"school_city",schoolPhone:"school_phone",schoolAddr:"school_city"};
    Object.keys(map).forEach(id=>{const el=document.getElementById(id);if(el)el.value=SD.t(map[id]);});
  }

  /* ---- Branches management ---- */
  function renderBranches(){
    const body=document.getElementById("brBody");if(!body)return;body.innerHTML="";
    const st=SD.state();
    SD.branches().forEach(b=>{
      const count=st.students.filter(s=>s.branchId===b.id).length;
      const adm=SD.adminsForBranch(b.id).map(a=>SD.adminName(a)).join(", ")||"—";
      const tr=document.createElement("tr");
      tr.innerHTML="<td data-label='"+SD.t("branch_name")+"'><strong>"+SD.branchName(b)+"</strong></td>"+
        "<td data-label='"+SD.t("branch_phone")+"'>"+b.phone+"</td>"+
        "<td data-label='"+SD.t("call_center")+"'><input class='input' data-call='"+b.id+"' value='"+(b.callCenter||"")+"' style='max-width:150px;padding:8px 10px'></td>"+
        "<td data-label='"+SD.t("total_students")+"'>"+count+"</td>"+
        "<td data-label='"+SD.t("tab_admins")+"'>"+adm+"</td>";
      const ci=tr.querySelector("[data-call]");
      ci.onchange=()=>{SD.setBranchCallCenter(b.id,ci.value.trim());
        SD.state().audit.unshift({time:SD.nowTime(),actor:"Moderator · Admin",event_en:"Set call center for "+b.name_en+" → "+ci.value.trim(),event_ar:"ضبط مركز الاتصال لـ "+b.name_en+" → "+ci.value.trim(),type:"info"});SD.save();
        SD.toast(SD.branchName(b)+" · "+SD.t("call_center_saved"),"success");};
      body.appendChild(tr);
    });
  }
  const addBranchBtn=document.getElementById("addBranch");
  if(addBranchBtn)addBranchBtn.onclick=()=>{
    const n=document.getElementById("brName").value.trim(),p=document.getElementById("brPhone").value.trim(),cc=document.getElementById("brCall").value.trim();
    if(!n||!p){SD.toast(SD.t("branch_required"),"warn");return;}
    const id=SD.addBranch(n,p);
    if(cc)SD.setBranchCallCenter(id,cc);
    SD.state().audit.unshift({time:SD.nowTime(),actor:"Moderator · Admin",event_en:"Added branch "+n+" ("+p+")",event_ar:"إضافة فرع "+n+" ("+p+")",type:"info"});SD.save();
    document.getElementById("brName").value="";document.getElementById("brPhone").value="";document.getElementById("brCall").value="";
    refreshBranchSelects();renderBranches();renderAdmins();renderSecurityPersonnel();renderStudents();
    SD.toast(SD.t("branch_saved")+": "+n,"success");
  };

  /* ---- Security personnel management ---- */
  function renderSecurityPersonnel(){
    const body=document.getElementById("secBody");if(!body)return;body.innerHTML="";
    SD.security().forEach(x=>{
      const tr=document.createElement("tr");
      const sel="<select data-sec='"+x.id+"'>"+branchOptions(x.branchId)+"</select>";
      tr.innerHTML="<td data-label='"+SD.t("security_name")+"'><strong>"+SD.securityName(x)+"</strong></td>"+
        "<td data-label='"+SD.t("security_phone")+"'>"+x.phone+"</td>"+
        "<td data-label='"+SD.t("branch")+"'><span class='badge badge-navy'>"+SD.branchName(x.branchId)+"</span></td>"+
        "<td data-label='"+SD.t("move_branch")+"'>"+sel+"</td>";
      const s=tr.querySelector("select");
      s.onchange=()=>{SD.moveSecurity(x.id,s.value);
        SD.state().audit.unshift({time:SD.nowTime(),actor:"Moderator · Admin",event_en:"Moved security "+x.name_en+" to "+SD.branchName(s.value),event_ar:"نقل فرد الأمن "+x.name_en+" إلى "+SD.branchName(s.value),type:"info"});SD.save();
        SD.toast(SD.securityName(x)+" → "+SD.branchName(s.value),"success");};
      body.appendChild(tr);
    });
  }
  const addSecurityBtn=document.getElementById("addSecurity");
  if(addSecurityBtn)addSecurityBtn.onclick=()=>{
    const n=document.getElementById("secName").value.trim(),p=document.getElementById("secPhone").value.trim(),br=document.getElementById("secBranch").value;
    if(!n||!p){SD.toast(SD.t("security_required"),"warn");return;}
    SD.addSecurity(n,p,br);
    SD.state().audit.unshift({time:SD.nowTime(),actor:"Moderator · Admin",event_en:"Created security "+n+" → "+SD.branchName(br),event_ar:"إنشاء أمن "+n+" → "+SD.branchName(br),type:"info"});SD.save();
    document.getElementById("secName").value="";document.getElementById("secPhone").value="";
    renderSecurityPersonnel();
    SD.toast(SD.t("security_created")+": "+n,"success");
  };

  /* ---- Admins management ---- */
  function renderAdmins(){
    const body=document.getElementById("adBody");if(!body)return;body.innerHTML="";
    SD.admins().forEach(a=>{
      const tr=document.createElement("tr");
      const sel="<select data-admin='"+a.id+"'>"+branchOptions(a.branchId)+"</select>";
      tr.innerHTML="<td data-label='"+SD.t("admin_name")+"'><strong>"+SD.adminName(a)+"</strong></td>"+
        "<td data-label='"+SD.t("admin_phone")+"'>"+a.phone+"</td>"+
        "<td data-label='"+SD.t("move_branch")+"'>"+sel+"</td>";
      const s=tr.querySelector("select");
      s.onchange=()=>{SD.moveAdmin(a.id,s.value);
        SD.state().audit.unshift({time:SD.nowTime(),actor:"Moderator · Admin",event_en:"Moved admin "+a.name_en+" to "+SD.branchName(s.value),event_ar:"نقل المسؤول "+a.name_en+" إلى "+SD.branchName(s.value),type:"info"});SD.save();
        renderBranches();SD.toast(SD.adminName(a)+" → "+SD.branchName(s.value),"success");};
      body.appendChild(tr);
    });
  }
  const addAdminBtn=document.getElementById("addAdmin");
  if(addAdminBtn)addAdminBtn.onclick=()=>{
    const n=document.getElementById("adName").value.trim(),p=document.getElementById("adPhone").value.trim(),br=document.getElementById("adBranch").value;
    if(!n||!p){SD.toast(SD.t("admin_required"),"warn");return;}
    SD.addAdmin(n,p,br);
    SD.state().audit.unshift({time:SD.nowTime(),actor:"Moderator · Admin",event_en:"Created admin "+n+" → "+SD.branchName(br),event_ar:"إنشاء مسؤول "+n+" → "+SD.branchName(br),type:"info"});SD.save();
    document.getElementById("adName").value="";document.getElementById("adPhone").value="";
    renderAdmins();renderBranches();
    SD.toast(SD.t("admin_created")+": "+n,"success");
  };

  /* ---- Students: branch assignment / move ---- */
  function renderStudents(){
    const body=document.getElementById("stuBody");if(!body)return;body.innerHTML="";
    const q=((document.getElementById("stuSearch")||{}).value||"").toLowerCase();
    const list=SD.state().students.filter(s=>!q||(s.name_en+" "+s.name_ar+" "+s.grade+" "+s.parent).toLowerCase().indexOf(q)>-1);
    if(!list.length){body.innerHTML="<tr><td colspan='4' class='muted'>"+SD.t("no_students")+"</td></tr>";return;}
    list.forEach(s=>{
      const tr=document.createElement("tr");
      const sel="<select data-stu='"+s.id+"'>"+branchOptions(s.branchId)+"</select>";
      tr.innerHTML="<td data-label='"+SD.t("student")+"'><strong>"+SD.studentName(s)+"</strong><div class='muted' style='font-size:12px'>"+s.id+"</div></td>"+
        "<td data-label='"+SD.t("grade")+"'>"+s.grade+"</td>"+
        "<td data-label='"+SD.t("parent")+"'>"+SD.personName(s.parent)+"</td>"+
        "<td data-label='"+SD.t("move_branch")+"'>"+sel+"</td>";
      const dd=tr.querySelector("select");
      dd.onchange=()=>{SD.moveStudent(s.id,dd.value);
        SD.state().audit.unshift({time:SD.nowTime(),actor:"Moderator · Admin",event_en:"Moved "+s.name_en+" to "+SD.branchName(dd.value),event_ar:"نقل "+s.name_ar+" إلى "+SD.branchName(dd.value),type:"info"});SD.save();
        renderBranches();SD.toast(SD.studentName(s)+" → "+SD.branchName(dd.value),"success");};
      body.appendChild(tr);
    });
  }
  const stuSearch=document.getElementById("stuSearch");if(stuSearch)stuSearch.oninput=renderStudents;

  /* ---- Classes & classroom display (per-branch) ---- */
  function renderBranchFeatures(){
    const wrap=document.getElementById("branchFeatureList");if(!wrap)return;wrap.innerHTML="";
    SD.branches().forEach(b=>{
      const row=document.createElement("div");
      row.className="card pad";row.style.cssText="display:flex;align-items:center;gap:12px;margin-bottom:10px;background:var(--navy-50)";
      const on=!!b.classesEnabled;
      row.innerHTML="<div style='flex:1'><strong>"+SD.branchName(b)+"</strong>"+
        "<div class='muted' style='font-size:12px'>"+SD.t("classroom_display")+" · "+SD.classesForBranch(b.id).length+" "+SD.t("tab_classes")+"</div></div>"+
        "<span class='badge "+(on?"badge-green":"badge-red")+"'>"+(on?SD.t("feature_on"):SD.t("feature_off"))+"</span>";
      const btn=document.createElement("button");btn.className="btn "+(on?"btn-ghost":"btn-success");btn.textContent=on?SD.t("feature_disable"):SD.t("feature_enable");
      btn.onclick=()=>{SD.setBranchClasses(b.id,!on);
        SD.state().audit.unshift({time:SD.nowTime(),actor:"Moderator · Admin",event_en:"Classroom display "+(!on?"enabled":"disabled")+" for "+b.name_en,event_ar:"عرض الصف "+(!on?"مفعّل":"معطّل")+" لـ "+b.name_en,type:"info"});SD.save();
        renderBranchFeatures();renderClassStudents();SD.toast(SD.branchName(b)+" · "+(!on?SD.t("feature_on"):SD.t("feature_off")),!on?"success":"warn");};
      row.appendChild(btn);wrap.appendChild(row);
    });
  }
  const addClassBtn=document.getElementById("addClass");
  if(addClassBtn)addClassBtn.onclick=()=>{
    const n=document.getElementById("clName").value.trim(),br=document.getElementById("clBranch").value;
    if(!n){SD.toast(SD.curLang()==="ar"?"أدخل اسم الفصل":"Enter a class name","warn");return;}
    SD.addClass(n,br);
    SD.state().audit.unshift({time:SD.nowTime(),actor:"Moderator · Admin",event_en:"Added class "+n+" → "+SD.branchName(br),event_ar:"إضافة فصل "+n+" → "+SD.branchName(br),type:"info"});SD.save();
    document.getElementById("clName").value="";
    renderBranchFeatures();renderClassStudents();
    SD.toast(SD.t("class_added")+": "+n,"success");
  };
  function classOptionsFor(branchId,sel){
    const list=SD.classesForBranch(branchId);
    return "<option value=''>"+SD.t("no_class")+"</option>"+list.map(c=>"<option value='"+c.id+"' "+(c.id===sel?"selected":"")+">"+SD.className(c)+"</option>").join("");
  }
  function renderClassStudents(){
    const body=document.getElementById("clStuBody");if(!body)return;body.innerHTML="";
    const list=SD.state().students;
    list.forEach(s=>{
      const enabled=SD.branchClassesEnabled(s.branchId);
      const tr=document.createElement("tr");
      const cell=enabled
        ? "<select data-cl='"+s.id+"'>"+classOptionsFor(s.branchId,s.classId)+"</select>"
        : "<span class='muted' style='font-size:12px'>"+SD.t("classes_disabled_branch")+"</span>";
      tr.innerHTML="<td data-label='"+SD.t("student")+"'><strong>"+SD.studentName(s)+"</strong><div class='muted' style='font-size:12px'>"+s.id+"</div></td>"+
        "<td data-label='"+SD.t("grade")+"'>"+s.grade+"</td>"+
        "<td data-label='"+SD.t("branch")+"'>"+SD.branchName(s.branchId)+"</td>"+
        "<td data-label='"+SD.t("link_class")+"'>"+cell+"</td>";
      const dd=tr.querySelector("select");
      if(dd)dd.onchange=()=>{SD.setStudentClass(s.id,dd.value);
        SD.state().audit.unshift({time:SD.nowTime(),actor:"Moderator · Admin",event_en:"Linked "+s.name_en+" to "+(dd.value?SD.className(dd.value):"no class"),event_ar:"ربط "+s.name_ar+" بـ "+(dd.value?SD.className(dd.value):"بدون فصل"),type:"info"});SD.save();
        SD.toast(SD.studentName(s)+" → "+(dd.value?SD.className(dd.value):SD.t("no_class")),"success");};
      body.appendChild(tr);
    });
  }

  function refreshBranchSelects(){
    fillBranchSelect(document.getElementById("adBranch"));
    fillBranchSelect(document.getElementById("secBranch"));
    fillBranchSelect(document.getElementById("clBranch"));
  }

  function renderAll(){renderSecurity();renderQR();renderAudit();renderBandSetup();setSchoolFields();refreshBranchSelects();renderBranches();renderAdmins();renderSecurityPersonnel();renderStudents();renderBranchFeatures();renderClassStudents();}
  const af=document.getElementById("auditFilter");if(af)af.oninput=renderAudit;
  const ec=document.getElementById("exportCsv");if(ec)ec.onclick=exportCsv;
  addKidRow();
  document.addEventListener("langchange",renderAll);
  document.addEventListener("sdsync",renderAll);
  document.addEventListener("DOMContentLoaded",()=>setTimeout(renderAll,0));
})();
</script>
</body>
</html>
